version: '3.9'

services:
  redis:
    image: redis:7-alpine
    container_name: nestjs-boilerplate-redis
    profiles: ['redis']
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: nestjs-boilerplate-postgres
    profiles: ['postgres']
    environment:
      POSTGRES_DB: ${DB_NAME:-nestjs_boilerplate}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-postgres}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5

  mysql:
    image: mysql:8.4
    container_name: nestjs-boilerplate-mysql
    profiles: ['mysql']
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: ${DB_NAME:-nestjs_boilerplate}
      MYSQL_USER: ${DB_USER:-nestjs}
      MYSQL_PASSWORD: ${DB_PASS:-nestjs}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS:-root}
    ports:
      - '${DB_PORT:-3306}:3306'
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', '127.0.0.1', '-u', 'root', '-p${DB_ROOT_PASS:-root}']
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  redis-data:
  postgres-data:
  mysql-data:
